services:
  db:
    image: postgis/postgis:15-3.4
    environment:
      - POSTGRES_DB=spotter
      - POSTGRES_USER=spotter
      - POSTGRES_PASSWORD=spotter_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./app:/code
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  postgres_data: